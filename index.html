<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fërkel Sharky - Setlist</title>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --dark-bg: #0f0f1b; 
        }
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            margin: 0;
        }
        header { 
            text-align: center; 
            margin-bottom: 25px; 
            margin-top: 10px;
        }
        img { 
            max-width: 220px; 
            width: 100%;
            height: auto;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: #1a1a2e; 
            border: 2px solid var(--neon-pink); 
        }
        th { 
            background: var(--neon-pink); 
            color: var(--dark-bg); 
            padding: 12px 8px; 
            text-transform: uppercase; 
            font-size: 0.85em; 
            font-weight: bold;
        }
        td { 
            border: 1px solid #333; 
            padding: 12px 8px; 
            color: #eee; 
            text-align: center; 
        }
        td:nth-child(2) { 
            text-align: left; 
        } 
        /* Styling für die klickbaren Status-Felder */
        .status-cell {
            font-size: 1.3em;
            cursor: pointer;
            user-select: none; /* Verhindert Textmarkierung beim schnellen Tippen */
            transition: background-color 0.2s;
        }
        .status-cell:active {
            background-color: #2a2a44; /* Kurzes Feedback beim Antippen */
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Fërkel Sharky Logo">
    </header>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Titel</th>
                <th>BPM</th>
                <th>Ablauf</th>
                <th>Sounds</th>
                <th>Drums</th>
            </tr>
        </thead>
        <tbody id="setlist-body"></tbody>
    </table>

    <script>
        const songs = [
            {titel: "Take On Me", bpm: 169}, 
            {titel: "Billie Jean", bpm: 117},
            {titel: "Girls Just Want To Have Fun", bpm: 120}, 
            {titel: "Tainted Love", bpm: 144},
            {titel: "Sweet Dreams (Are Made of This)", bpm: 125}, 
            {titel: "Blue Monday", bpm: 130},
            {titel: "Purple Rain", bpm: 114}, 
            {titel: "Don't You (Forget About Me)", bpm: 112},
            {titel: "Time After Time", bpm: 130}, 
            {titel: "Every Breath You Take", bpm: 117}
        ];

        const tbody = document.getElementById('setlist-body');

        // Tabelle generieren
        songs.forEach((s, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${s.titel}</td>
                    <td>${s.bpm}</td>
                    <td id="cell-${i}-ablauf" class="status-cell" onclick="toggleStatus('${i}', 'ablauf')">❌</td>
                    <td id="cell-${i}-sounds" class="status-cell" onclick="toggleStatus('${i}', 'sounds')">❌</td>
                    <td id="cell-${i}-drums" class="status-cell" onclick="toggleStatus('${i}', 'drums')">❌</td>
                </tr>
            `;
        });

        // Schaltet zwischen X und Haken um und speichert den Zustand
        function toggleStatus(songIndex, type) {
            const id = `cell-${songIndex}-${type}`;
            const cell = document.getElementById(id);
            
            if (cell.innerHTML === "❌") {
                cell.innerHTML = "✅";
                localStorage.setItem(id, "checked");
            } else {
                cell.innerHTML = "❌";
                localStorage.setItem(id, "unchecked");
            }
        }

        // Lädt den Zustand beim Starten der Seite
        function loadStates() {
            songs.forEach((s, i) => {
                const types = ['ablauf', 'sounds', 'drums'];
                types.forEach(type => {
                    const id = `cell-${i}-${type}`;
                    const savedState = localStorage.getItem(id);
                    const cell = document.getElementById(id);
                    
                    if (cell) {
                        if (savedState === "checked") {
                            cell.innerHTML = "✅";
                        } else {
                            cell.innerHTML = "❌";
                        }
                    }
                });
            });
        }

        window.onload = loadStates;
    </script>
</body>
</html>
