<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fërkel Sharky - Setlist 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --neon-blue: #01cdfe;
            --dark-bg: #0d0c1d; 
            --card-bg: rgba(26, 26, 46, 0.8);
        }
        
        body { 
            background-color: var(--dark-bg); 
            background-image: 
                linear-gradient(rgba(255, 113, 206, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 113, 206, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 480px; 
        }

        header { 
            text-align: center; 
            margin: 15px 0 5px 0;
        }

        header img { 
            max-width: 140px; 
            height: auto;
        }

        h2 {
            color: var(--neon-pink);
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin: 0 0 25px 0;
        }

        #setlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .song-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 8px rgba(1, 205, 254, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        .song-main {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            padding-right: 15px;
        }

        .handle {
            cursor: grab;
            color: #555;
            font-size: 1.3em;
            margin-right: 12px;
            user-select: none;
            flex-shrink: 0;
        }

        .song-number {
            color: var(--neon-pink);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1em;
            margin-right: 10px;
            min-width: 25px;
            flex-shrink: 0;
        }

        .song-title {
            font-size: 1.05em;
            font-weight: 500;
            white-space: normal;
            word-break: break-word;
            color: #fff;
        }

        .status-btn {
            font-size: 1.4em;
            cursor: pointer;
            user-select: none;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        
        .status-btn:active { 
            transform: scale(0.8); 
        }

        .sortable-ghost {
            opacity: 0.3;
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px var(--neon-pink);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="Fërkel Sharky Logo">
        </header>
        
        <h2>Setlist 2026</h2>

        <ul id="setlist-container"></ul>
    </div>

    <script>
        const defaultSongs = [
            {titel: "Don't Change"}, 
            {titel: "Cities in Dust"}, 
            {titel: "Hungry Like the Wolf"}, 
            {titel: "Safety Dance"}, 
            {titel: "Early Morning Wake Up Call"}, 
            {titel: "A Forest"}, 
            {titel: "I Ran"}, 
            {titel: "Enola Gay"}, 
            {titel: "You Spin Me Around"}, 
            {titel: "You Keep Me Hanging On"}, 
            {titel: "Touch Me"}, 
            {titel: "Electricity"}, 
            {titel: "Edge of Heaven"}
        ];

        const container = document.getElementById('setlist-container');
        
        // Holt den alten Speicher
        let savedOrder = localStorage.getItem('fs-song-order');
        let songs;

        if (savedOrder) {
            try {
                songs = JSON.parse(savedOrder);
                // WICHTIG: Wenn die Anzahl der Lieder nicht übereinstimmt, löschen wir den alten Müll!
                if (!Array.isArray(songs) || songs.length !== defaultSongs.length) {
                    localStorage.removeItem('fs-song-order');
                    songs = defaultSongs;
                }
            } catch(e) {
                songs = defaultSongs;
            }
        } else {
            songs = defaultSongs;
        }

        function renderList() {
            container.innerHTML = "";
            songs.forEach((s, i) => {
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                
                container.innerHTML += `
                    <li class="song-card" data-title="${s.titel}">
                        <div class="song-main">
                            <span class="handle">☰</span>
                            <span class="song-number">${i + 1}</span>
                            <span class="song-title">${s.titel}</span>
                        </div>
                        <span id="btn-${safeTitle}" class="status-btn" onclick="toggleStatus('${safeTitle}')">❌</span>
                    </li>
                `;
            });
            loadStates();
        }

        function updateNumbersAndSaveOrder() {
            const cards = container.querySelectorAll('.song-card');
            const newOrder = [];
            
            cards.forEach((card, i) => {
                card.querySelector('.song-number').innerText = i + 1;
                newOrder.push({ titel: card.getAttribute('data-title') });
            });
            
            songs = newOrder;
            localStorage.setItem('fs-song-order', JSON.stringify(songs));
        }

        function toggleStatus(songId) {
            const id = `btn-${songId}`;
            const btn = document.getElementById(id);
            
            if (btn.innerHTML === "❌") {
                btn.innerHTML = "✅";
                localStorage.setItem(id, "checked");
            } else {
                btn.innerHTML = "❌";
                localStorage.setItem(id, "unchecked");
            }
        }

        function loadStates() {
            songs.forEach((s) => {
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                const id = `btn-${safeTitle}`;
                const savedState = localStorage.getItem(id);
                const btn = document.getElementById(id);
                
                if (btn) {
                    if (savedState === "checked") {
                        btn.innerHTML = "✅";
                    } else {
                        btn.innerHTML = "❌";
                    }
                }
            });
        }

        Sortable.create(container, {
            handle: '.handle',
            animation: 220,
            ghostClass: 'sortable-ghost',
            onEnd: function () {
                updateNumbersAndSaveOrder();
            }
        });

        renderList();
    </script>
</body>
</html>
