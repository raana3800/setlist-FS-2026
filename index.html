<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fërkel Sharky - Setlist 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --neon-blue: #01cdfe;
            --dark-bg: #0d0c1d; 
            --card-bg: rgba(26, 26, 46, 0.8);
        }
        
        body { 
            background-color: var(--dark-bg); 
            background-image: 
                linear-gradient(rgba(255, 113, 206, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 113, 206, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 480px; 
        }

        header { 
            text-align: center; 
            margin: 15px 0 5px 0;
        }

        header img { 
            max-width: 140px; 
            height: auto;
        }

        h2 {
            color: var(--neon-pink);
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin: 0 0 25px 0;
        }

        #setlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .song-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 8px rgba(1, 205, 254, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
            transition: transform 0.2s;
        }

        .song-main {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            padding-right: 15px;
        }

        .handle {
            cursor: grab;
            color: #555;
            font-size: 1.3em;
            margin-right: 12px;
            user-select: none;
            flex-shrink: 0;
        }

        .song-number {
            color: var(--neon-pink);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1em;
            margin-right: 10px;
            min-width: 25px;
            flex-shrink: 0;
        }

        .song-title {
            font-size: 1.05em;
            font-weight: 500;
            white-space: normal;
            word-break: break-word;
            color: #fff;
        }

        .status-btn {
            font-size: 1.4em;
            cursor: pointer;
            user-select: none;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        
        .status-btn:active { 
            transform: scale(0.8); 
        }

        .sortable-ghost {
            opacity: 0.3;
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px var(--neon-pink);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="Fërkel Sharky Logo">
        </header>
        
        <h2>Setlist 2026</h2>

        <ul id="setlist-container"></ul>
    </div>

    <script>
        // Supabase Verbindungskonfiguration mit deinem Key
        const SUPABASE_URL = "https://wpwljflkmlbyrkxlxrwf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_beahjmAA-eKbVRy5K_Z8NQ_kMhJ8nG1";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const container = document.getElementById('setlist-container');
        let currentSongs = [];

        // 1. Songs aus der Cloud laden
        async function fetchSetlist() {
            const { data, error } = await supabase
                .from('setlist')
                .select('*')
                .order('position', { ascending: true });

            if (error) console.error("Fehler beim Laden:", error);
            if (data) {
                currentSongs = data;
                renderList();
            }
        }

        // 2. HTML-Struktur der Liste aufbauen
        function renderList() {
            container.innerHTML = "";
            currentSongs.forEach((s, i) => {
                const statusIcon = s.checked ? "✅" : "❌";
                container.innerHTML += `
                    <li class="song-card" data-id="${s.id}">
                        <div class="song-main">
                            <span class="handle">☰</span>
                            <span class="song-number">${i + 1}</span>
                            <span class="song-title">${s.titel}</span>
                        </div>
                        <span id="btn-${s.id}" class="status-btn" onclick="toggleCloudStatus('${s.id}', ${s.checked})">${statusIcon}</span>
                    </li>
                `;
            });
        }

        // 3. Status sofort lokal umschalten und in die Cloud senden
        async function toggleCloudStatus(id, currentStatus) {
            const nextStatus = !currentStatus;
            
            // Sofortige visuelle Rückmeldung im Browser (optimistisches UI)
            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.innerHTML = nextStatus ? "✅" : "❌";
                // Klick-Event aktualisieren, damit Folgeklicks stimmen
                btn.setAttribute('onclick', `toggleCloudStatus('${id}', ${nextStatus})`);
            }

            // Update an Supabase senden
            const { error } = await supabase
                .from('setlist')
                .update({ checked: nextStatus })
                .eq('id', id);

            if (error) console.error("Fehler beim Haken-Update:", error);
        }

        // 4. Neue Reihenfolge berechnen und in die Cloud schieben
        async function saveCloudOrder() {
            const cards = container.querySelectorAll('.song-card');
            
            for (let i = 0; i < cards.length; i++) {
                const id = cards[i].getAttribute('data-id');
                cards[i].querySelector('.song-number').innerText = i + 1;
                
                await supabase
                    .from('setlist')
                    .update({ position: i + 1 })
                    .eq('id', id);
            }
        }

        // 5. ECHTZEIT-KANAL: Lauscht live auf Änderungen von anderen Geräten
        supabase
            .channel('schema-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'setlist' },
                () => {
                    fetchSetlist(); // Liste sofort aktualisieren, wenn ein Bandkollege schiebt oder hakt
                }
            )
            .subscribe();

        // Drag & Drop aktivieren
        Sortable.create(container, {
            handle: '.handle',
            animation: 220,
            ghostClass: 'sortable-ghost',
            onEnd: function () {
                saveCloudOrder();
            }
        });

        // App starten
        fetchSetlist();
    </script>
</body>
</html>
