<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fërkel Sharky - Setlist</title>
    <style>
        :root { --neon-pink: #ff71ce; --dark-bg: #0f0f1b; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Courier New', monospace; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        img { max-width: 250px; filter: drop-shadow(0 0 10px var(--neon-pink)); }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border: 2px solid var(--neon-pink); }
        th { background: var(--neon-pink); color: var(--dark-bg); padding: 10px; text-transform: uppercase; font-size: 0.8em; }
        td { border: 1px solid #333; padding: 10px; color: #eee; text-align: center; }
        td:nth-child(2) { text-align: left; } /* Titel linksbündig für bessere Lesbarkeit */
        input[type="checkbox"] { transform: scale(1.3); accent-color: var(--neon-pink); }
    </style>
</head>
<body>

    <header>
        <img src="FS_Logo Kopie2.png" alt="Fërkel Sharky Logo">
    </header>

    <table>
        <thead>
            <tr>
                <th>#</th><th>Titel</th><th>BPM</th>
                <th>Ablauf</th><th>Sounds</th><th>Drums</th>
            </tr>
        </thead>
        <tbody id="setlist-body"></tbody>
    </table>

    <script>
        const songs = [
            {titel: "Take On Me", bpm: 169}, {titel: "Billie Jean", bpm: 117},
            {titel: "Girls Just Want To Have Fun", bpm: 120}, {titel: "Tainted Love", bpm: 144},
            {titel: "Sweet Dreams", bpm: 125}, {titel: "Blue Monday", bpm: 130},
            {titel: "Purple Rain", bpm: 114}, {titel: "Don't You", bpm: 112},
            {titel: "Time After Time", bpm: 130}, {titel: "Every Breath You Take", bpm: 117}
        ];
        const tbody = document.getElementById('setlist-body');
        songs.forEach((s, i) => {
            tbody.innerHTML += `<tr>
                <td>${i + 1}</td><td>${s.titel}</td><td>${s.bpm}</td>
                <td><input type="checkbox"></td><td><input type="checkbox"></td><td><input type="checkbox"></td>
            </tr>`;
        });
    </script>
</body>
</html>
