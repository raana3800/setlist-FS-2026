<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Setliste</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
        .checkbox-group { display: flex; gap: 5px; justify-content: center; }
        /* Responsive Anpassung für Handys */
        @media (max-width: 600px) {
            th:nth-child(3), td:nth-child(3) { display: none; } /* Versteckt BPM auf sehr kleinen Screens */
        }
    </style>
</head>
<body>

    <h2>Setliste (80er Jahre Special)</h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Titel</th>
                <th>BPM</th>
                <th>Check (Arr, Snd, Abl, Dr)</th>
            </tr>
        </thead>
        <tbody id="setlist-body">
            <!-- Die Zeilen werden per JS eingefügt -->
        </tbody>
    </table>

    <script>
        const songs = [
            {titel: "Take On Me", bpm: 169},
            {titel: "Africa", bpm: 93},
            {titel: "Billie Jean", bpm: 117},
            {titel: "Blue Monday", bpm: 130},
            {titel: "Purple Rain", bpm: 57},
            {titel: "Sweet Child O' Mine", bpm: 125},
            {titel: "Everybody Wants To Rule The World", bpm: 112},
            {titel: "Don't You (Forget About Me)", bpm: 112},
            {titel: "Smalltown Boy", bpm: 135},
            {titel: "Tainted Love", bpm: 144}
        ];

        const tbody = document.getElementById('setlist-body');
        songs.forEach((s, index) => {
            const row = `<tr>
                <td>${index + 1}</td>
                <td>${s.titel}</td>
                <td>${s.bpm}</td>
                <td class="checkbox-group">
                    <input type="checkbox"> <input type="checkbox"> <input type="checkbox"> <input type="checkbox">
                </td>
            </tr>`;
            tbody.innerHTML += row;
        });
    </script>
</body>
</html>
