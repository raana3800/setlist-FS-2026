<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fërkel Sharky - Setlist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --neon-blue: #01cdfe;
            --dark-bg: #0d0c1d; 
            --card-bg: rgba(26, 26, 46, 0.8);
        }
        
        body { 
            background-color: var(--dark-bg); 
            background-image: 
                linear-gradient(rgba(255, 113, 206, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 113, 206, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 480px; 
        }

        header { 
            text-align: center; 
            margin: 15px 0 5px 0;
        }

        header img { 
            max-width: 140px; 
            height: auto;
        }

        h2 {
            color: var(--neon-pink);
            text-align: center;
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin: 0 0 20px 0;
        }

        #setlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        /* Komplett überarbeitete Kachel für Smartphones */
        .song-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 8px rgba(1, 205, 254, 0.15);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        /* Linker Bereich: Grip + Titel */
        .song-main {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0; /* Verhindert das Abschneiden des Containers */
            padding-right: 10px;
        }

        .handle {
            cursor: grab;
            color: #555;
            font-size: 1.2em;
            margin-right: 10px;
            user-select: none;
            flex-shrink: 0;
        }

        .song-title {
            font-size: 0.95em;
            font-weight: 500;
            white-space: normal; /* Erlaubt Zeilenumbruch bei sehr langen Titeln statt "..." */
            word-break: break-word;
            color: #fff;
        }

        /* Rechter Bereich: Kompakter Status-Block */
        .status-group {
            display: flex;
            gap: 10px;
            flex-shrink: 0; /* Verhindert, dass die Buttons gequetscht werden */
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 42px;
        }

        /* Die interaktiven Symbole im Retro-Look */
        .status-btn {
            font-size: 1.2em;
            cursor: pointer;
            user-select: none;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        
        .status-btn:active { 
            transform: scale(0.8); 
        }

        /* Kleine Beschriftung sauber darunter platziert */
        .status-label {
            font-size: 0.55em;
            color: #888;
            text-transform: uppercase;
            margin-top: 3px;
            letter-spacing: 0.3px;
            text-align: center;
        }

        .sortable-ghost {
            opacity: 0.3;
            border-color: var(--neon-pink);
            box-shadow: 0 0 12px var(--neon-pink);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="Fërkel Sharky Logo">
        </header>
        
        <h2>Fërkel Sharky Setlist</h2>

        <ul id="setlist-container"></ul>
    </div>

    <script>
        const defaultSongs = [
            {titel: "Take On Me"}, {titel: "Billie Jean"},
            {titel: "Girls Just Want To Have Fun"}, {titel: "Tainted Love"},
            {titel: "Sweet Dreams (Are Made of This)"}, {titel: "Blue Monday"},
            {titel: "Purple Rain"}, {titel: "Don't You (Forget About Me)"},
            {titel: "Time After Time"}, {titel: "Every Breath You Take"}
        ];

        const container = document.getElementById('setlist-container');
        let savedOrder = localStorage.getItem('fs-song-order');
        let songs = savedOrder ? JSON.parse(savedOrder) : defaultSongs;

        function renderList() {
            container.innerHTML = "";
            songs.forEach((s, i) => {
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                
                container.innerHTML += `
                    <li class="song-card" data-title="${s.titel}">
                        <div class="song-main">
                            <span class="handle">☰</span>
                            <span class="song-title">${s.titel}</span>
                        </div>
                        <div class="status-group">
                            <div class="status-item">
                                <span id="btn-${safeTitle}-ablauf" class="status-btn" onclick="toggleStatus('${safeTitle}', 'ablauf')">❌</span>
                                <span class="status-label">Ablauf</span>
                            </div>
                            <div class="status-item">
                                <span id="btn-${safeTitle}-sounds" class="status-btn" onclick="toggleStatus('${safeTitle}', 'sounds')">Sounds</span>
                            </div>
                            <div class="status-item">
                                <span id="btn-${safeTitle}-drums" class="status-btn" onclick="toggleStatus('${safeTitle}', 'drums')">❌</span>
                                <span class="status-label">Drums</span>
                            </div>
                        </div>
                    </li>
                `;
            });
            loadStates();
        }

        function saveNewOrder() {
            const cards = container.querySelectorAll('.song-card');
            const newOrder = [];
            cards.forEach(card => {
                newOrder.push({ titel: card.getAttribute('data-title') });
            });
            songs = newOrder;
            localStorage.setItem('fs-song-order', JSON.stringify(songs));
        }

        function toggleStatus(songId, type) {
            const id = `btn-${songId}-${type}`;
            const btn = document.getElementById(id);
            
            if (btn.innerHTML === "❌") {
                btn.innerHTML = "✅";
                localStorage.setItem(id, "checked");
            } else {
                btn.innerHTML = "❌";
                localStorage.setItem(id, "unchecked");
            }
        }

        // Korrektur: Lädt jetzt die Zustände absolut fehlerfrei für jede einzelne Kachel
        function loadStates() {
            songs.forEach((s) => {
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                const types = ['ablauf', 'sounds', 'drums'];
                
                types.forEach(type => {
                    const id = `btn-${safeTitle}-${type}`;
                    const savedState = localStorage.getItem(id);
                    const btn = document.getElementById(id);
                    
                    if (btn) {
                        if (savedState === "checked") {
                            btn.innerHTML = "✅";
                        } else {
                            btn.innerHTML = "❌";
                        }
                    }
                });
            });
        }

        Sortable.create(container, {
            handle: '.handle',
            animation: 220,
            ghostClass: 'sortable-ghost',
            onEnd: function () {
                saveNewOrder();
            }
        });

        renderList();
    </script>
</body>
</html>
