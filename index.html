<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fërkel Sharky - Setlist 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --neon-blue: #01cdfe;
            --neon-green: #05ffa1;
            --dark-bg: #0d0c1d; 
            --card-bg: rgba(26, 26, 46, 0.8);
        }
        
        body { 
            background-color: var(--dark-bg); 
            background-image: 
                linear-gradient(rgba(255, 113, 206, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 113, 206, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }
        header { text-align: center; margin: 15px 0 5px 0; }
        header img { max-width: 140px; height: auto; }
        h2 {
            color: var(--neon-pink);
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin: 0 0 25px 0;
        }

        #setlist-container { list-style: none; padding: 0; margin: 0; }

        .song-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 8px rgba(1, 205, 254, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        .song-main { display: flex; align-items: center; flex: 1; min-width: 0; padding-right: 10px; }
        .handle { cursor: grab; color: #555; font-size: 1.3em; margin-right: 12px; user-select: none; flex-shrink: 0; }
        
        .song-number {
            color: var(--neon-pink);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1em;
            margin-right: 10px;
            min-width: 25px;
            flex-shrink: 0;
        }

        .song-title { font-size: 1.05em; font-weight: 500; white-space: normal; word-break: break-word; color: #fff; }

        .status-group {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .status-btn {
            font-size: 1.2em;
            cursor: pointer;
            user-select: none;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            transition: transform 0.1s, border-color 0.2s, box-shadow 0.2s;
        }
        
        .status-btn.state-false {
            border-color: rgba(255, 113, 206, 0.3);
            box-shadow: inset 0 0 4px rgba(255, 113, 206, 0.2);
            filter: grayscale(0.8) opacity(0.5);
        }

        .status-btn.state-true {
            border-color: var(--neon-green);
            box-shadow: 0 0 8px rgba(5, 255, 161, 0.4), inset 0 0 4px rgba(5, 255, 161, 0.2);
            filter: none;
        }

        .status-btn:active { transform: scale(0.8); }
        .sortable-ghost { opacity: 0.3; border-color: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink); }
    </style>
</head>
<body>

    <div class="container">
        <header><img src="logo.png" alt="Fërkel Sharky Logo"></header>
        <h2>Setlist 2026</h2>
        <ul id="setlist-container"></ul>
    </div>

    <script>
        const API_URL = "https://wpwljflkmlbyrkxlxrwf.supabase.co/rest/v1/setlist";
        const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indwd2xqZmxrbWxieXJreGx4cndmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjkyNzAsImV4cCI6MjA5NTA0NTI3MH0.wpe_2zuAsK5CmIeXtF3tOk9YrGuoqCKIetvzDvPJlf0";

        const container = document.getElementById('setlist-container');
        let currentSongs = [];
        let isDragging = false;

        const headers = {
            "apikey": API_KEY,
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
        };

        async function fetchSetlist() {
            if (isDragging) return;
            try {
                const response = await fetch(`${API_URL}?select=*&order=position.asc`, { headers });
                const data = await response.json();
                
                if (JSON.stringify(data) !== JSON.stringify(currentSongs)) {
                    currentSongs = data;
                    renderList();
                }
            } catch (err) {
                console.error("Fehler beim Laden:", err);
            }
        }

        function renderList() {
            container.innerHTML = "";
            currentSongs.forEach((s, i) => {
                const statusAblauf = s.status_ablauf || false;
                const statusKeyboard = s.status_keyboard || false;
                const statusDrums = s.status_drums || false;

                container.innerHTML += `
                    <li class="song-card" data-id="${s.id}">
                        <div class="song-main">
                            <span class="handle">☰</span>
                            <span class="song-number">${i + 1}</span>
                            <span class="song-title">${s.titel}</span>
                        </div>
                        <div class="status-group">
                            <button id="btn-ablauf-${s.id}" class="status-btn state-${statusAblauf}" 
                                onclick="toggleCloudStatus('${s.id}', 'status_ablauf', ${statusAblauf})" title="Ablauf">📋</button>
                            
                            <button id="btn-kybd-${s.id}" class="status-btn state-${statusKeyboard}" 
                                onclick="toggleCloudStatus('${s.id}', 'status_keyboard', ${statusKeyboard})" title="Keyboard">🎹</button>
                            
                            <button id="btn-drums-${s.id}" class="status-btn state-${statusDrums}" 
                                onclick="toggleCloudStatus('${s.id}', 'status_drums', ${statusDrums})" title="Drums">🥁</button>
                        </div>
                    </li>
                `;
            });
        }

        async function toggleCloudStatus(id, column, currentStatus) {
            const nextStatus = !currentStatus;
            
            let btnId = `btn-ablauf-${id}`;
            if (column === 'status_keyboard') btnId = `btn-kybd-${id}`;
            if (column === 'status_drums') btnId = `btn-drums-${id}`;

            const btn = document.getElementById(btnId);
            if (btn) {
                btn.className = `status-btn state-${nextStatus}`;
                btn.setAttribute('onclick', `toggleCloudStatus('${id}', '${column}', ${nextStatus})`);
            }

            try {
                const updateBody = {};
                updateBody[column] = nextStatus;

                await fetch(`${API_URL}?id=eq.${id}`, {
                    method: "PATCH",
                    headers,
                    body: JSON.stringify(updateBody)
                });
            } catch (err) {
                console.error(`Fehler beim Update von ${column}:`, err);
            }
        }

        async function saveCloudOrder() {
            isDragging = true;
            const cards = container.querySelectorAll('.song-card');
            
            cards.forEach((card, i) => {
                card.querySelector('.song-number').innerText = i + 1;
            });

            try {
                for (let i = 0; i < cards.length; i++) {
                    const id = cards[i].getAttribute('data-id');
                    await fetch(`${API_URL}?id=eq.${id}`, {
                        method: "PATCH",
                        headers,
                        body: JSON.stringify({ position: i + 1 })
                    });
                }
            } catch (err) {
                console.error("Fehler beim Positions-Update:", err);
            }
            isDragging = false;
            fetchSetlist();
        }

        setInterval(fetchSetlist, 2000);

        Sortable.create(container, {
            handle: '.handle',
            animation: 220,
            ghostClass: 'sortable-ghost',
            onChoose: () => { isDragging = true; },
            onEnd: function () {
                saveCloudOrder();
            }
        });

        fetchSetlist();
    </script>
</body>
</html>
