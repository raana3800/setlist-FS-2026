<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fërkel Sharky - Setlist 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --neon-blue: #01cdfe;
            --dark-bg: #0d0c1d; 
            --card-bg: rgba(26, 26, 46, 0.8);
        }
        
        body { 
            background-color: var(--dark-bg); 
            background-image: 
                linear-gradient(rgba(255, 113, 206, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 113, 206, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 480px; }
        header { text-align: center; margin: 15px 0 5px 0; }
        header img { max-width: 140px; height: auto; }
        h2 {
            color: var(--neon-pink);
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin: 0 0 25px 0;
        }

        #setlist-container { list-style: none; padding: 0; margin: 0; }

        .song-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 8px rgba(1, 205, 254, 0.15);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        .song-main { display: flex; align-items: center; flex: 1; min-width: 0; padding-right: 15px; }
        .handle { cursor: grab; color: #555; font-size: 1.3em; margin-right: 12px; user-select: none; flex-shrink: 0; }
        
        .song-number {
            color: var(--neon-pink);
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1em;
            margin-right: 10px;
            min-width: 25px;
            flex-shrink: 0;
        }

        .song-title { font-size: 1.05em; font-weight: 500; white-space: normal; word-break: break-word; color: #fff; }

        .status-btn {
            font-size: 1.4em;
            cursor: pointer;
            user-select: none;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        .status-btn:active { transform: scale(0.8); }
        .sortable-ghost { opacity: 0.3; border-color: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink); }
    </style>
</head>
<body>

    <div class="container">
        <header><img src="logo.png" alt="Fërkel Sharky Logo"></header>
        <h2>Setlist 2026</h2>
        <ul id="setlist-container"></ul>
    </div>

    <script>
        const SUPABASE_URL = "https://wpwljflkmlbyrkxlxrwf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indwd2xqZmxrbWxieXJreGx4cndmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjkyNzAsImV4cCI6MjA5NTA0NTI3MH0.wpe_2zuAsK5CmIeXtF3tOk9YrGuoqCKIetvzDvPJlf0";

        // Minimalistische Standard-Initialisierung ohne blockierende Parameter
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const container = document.getElementById('setlist-container');
        let currentSongs = [];
        let isDragging = false;

        // 1. Daten laden (Läuft immer, da keine Parameter blockieren)
        async function fetchSetlist() {
            if (isDragging) return;
            try {
                const { data, error } = await supabase
                    .from('setlist')
                    .select('*')
                    .order('position', { ascending: true });

                if (error) throw error;
                if (data) {
                    currentSongs = data;
                    renderList();
                }
            } catch (err) {
                console.error("Fehler beim Laden:", err);
            }
        }

        // 2. UI rendern
        function renderList() {
            container.innerHTML = "";
            currentSongs.forEach((s, i) => {
                const statusIcon = s.checked ? "✅" : "❌";
                container.innerHTML += `
                    <li class="song-card" data-id="${s.id}">
                        <div class="song-main">
                            <span class="handle">☰</span>
                            <span class="song-number">${i + 1}</span>
                            <span class="song-title">${s.titel}</span>
                        </div>
                        <span id="btn-${s.id}" class="status-btn" onclick="toggleCloudStatus('${s.id}', ${s.checked})">${statusIcon}</span>
                    </li>
                `;
            });
        }

        // 3. Status umschalten (Optimistisch für sofortiges Feedback)
        async function toggleCloudStatus(id, currentStatus) {
            const nextStatus = !currentStatus;
            const btn = document.getElementById(`btn-${id}`);
            if (btn) {
                btn.innerHTML = nextStatus ? "✅" : "❌";
                btn.setAttribute('onclick', `toggleCloudStatus('${id}', ${nextStatus})`);
            }

            await supabase
                .from('setlist')
                .update({ checked: nextStatus })
                .eq('id', id);
        }

        // 4. Drag & Drop Positionen speichern
        async function saveCloudOrder() {
            isDragging = true;
            const cards = container.querySelectorAll('.song-card');
            
            cards.forEach((card, i) => {
                card.querySelector('.song-number').innerText = i + 1;
            });

            for (let i = 0; i < cards.length; i++) {
                const id = cards[i].getAttribute('data-id');
                await supabase
                    .from('setlist')
                    .update({ position: i + 1 })
                    .eq('id', id);
            }
            isDragging = false;
        }

        // 5. Absolut stabiler Echtzeit-Sync über offizielle Kanäle
        supabase
            .channel('table-db-changes')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'setlist' },
                (payload) => {
                    // Verhindert ein Neuladen auf dem Gerät, das gerade selbst zieht
                    if (!isDragging) {
                        fetchSetlist();
                    }
                }
            )
            .subscribe();

        // Drag & Drop Setup
        Sortable.create(container, {
            handle: '.handle',
            animation: 220,
            ghostClass: 'sortable-ghost',
            onChoose: () => { isDragging = true; },
            onEnd: function () {
                saveCloudOrder();
            }
        });

        // App starten
        fetchSetlist();
    </script>
</body>
</html>
