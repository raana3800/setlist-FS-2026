<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fërkel Sharky - Setlist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --dark-bg: #0f0f1b; 
        }
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            margin: 0;
        }
        header { 
            text-align: center; 
            margin-bottom: 25px; 
            margin-top: 10px;
        }
        img { 
            max-width: 220px; 
            width: 100%;
            height: auto;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: #1a1a2e; 
            border: 2px solid var(--neon-pink); 
        }
        th { 
            background: var(--neon-pink); 
            color: var(--dark-bg); 
            padding: 12px 8px; 
            text-transform: uppercase; 
            font-size: 0.85em; 
            font-weight: bold;
        }
        td { 
            border: 1px solid #333; 
            padding: 12px 8px; 
            color: #eee; 
            text-align: center; 
        }
        .song-title-cell { 
            text-align: left; 
        } 
        /* Das Grip-Symbol */
        .handle {
            cursor: grab;
            color: var(--neon-pink);
            padding-right: 10px;
            font-size: 1.2em;
            display: inline-block;
            user-select: none;
        }
        .handle:active {
            cursor: grabbing;
        }
        .status-cell {
            font-size: 1.3em;
            cursor: pointer;
            user-select: none; 
            transition: background-color 0.2s;
        }
        .status-cell:active {
            background-color: #2a2a44; 
        }
        /* Highlight für die Zeile, die gerade bewegt wird */
        .sortable-ghost {
            opacity: 0.4;
            background-color: var(--neon-pink) !important;
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Fërkel Sharky Logo">
    </header>

    <table>
        <thead>
            <tr>
                <th style="width: 50px;">#</th>
                <th>Titel</th>
                <th style="width: 90px;">Ablauf</th>
                <th style="width: 90px;">Sounds</th>
                <th style="width: 90px;">Drums</th>
            </tr>
        </thead>
        <tbody id="setlist-body"></tbody>
    </table>

    <script>
        // Start-Reihenfolge der Songs
        const defaultSongs = [
            {titel: "Take On Me"}, {titel: "Billie Jean"},
            {titel: "Girls Just Want To Have Fun"}, {titel: "Tainted Love"},
            {titel: "Sweet Dreams (Are Made of This)"}, {titel: "Blue Monday"},
            {titel: "Purple Rain"}, {titel: "Don't You (Forget About Me)"},
            {titel: "Time After Time"}, {titel: "Every Breath You Take"}
        ];

        const tbody = document.getElementById('setlist-body');

        // 1. Reihenfolge laden (falls schon mal verschoben wurde)
        let savedOrder = localStorage.getItem('song-order');
        let songs = savedOrder ? JSON.parse(savedOrder) : defaultSongs;

        // Tabelle aufbauen
        function renderTable() {
            tbody.innerHTML = "";
            songs.forEach((s, i) => {
                // Eindeutige IDs basierend auf dem Songtitel generieren, damit der Haken beim Verschieben mitwandert
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                
                tbody.innerHTML += `
                    <tr data-title="${s.titel}">
                        <td class="row-number">${i + 1}</td>
                        <td class="song-title-cell">
                            <span class="handle">☰</span>${s.titel}
                        </td>
                        <td id="cell-${safeTitle}-ablauf" class="status-cell" onclick="toggleStatus('${safeTitle}', 'ablauf')">❌</td>
                        <td id="cell-${safeTitle}-sounds" class="status-cell" onclick="toggleStatus('${safeTitle}', 'sounds')">❌</td>
                        <td id="cell-${safeTitle}-drums" class="status-cell" onclick="toggleStatus('${safeTitle}', 'drums')">❌</td>
                    </tr>
                `;
            });
            loadStates();
        }

        // Nummern (1-10) nach dem Verschieben neu vergeben
        function updateNumbersAndSaveOrder() {
            const rows = tbody.querySelectorAll('tr');
            const newOrder = [];
            
            rows.forEach((row, i) => {
                row.querySelector('.row-number').innerText = i + 1;
                newOrder.push({ titel: row.getAttribute('data-title') });
            });
            
            songs = newOrder;
            localStorage.setItem('song-order', JSON.stringify(songs));
        }

        // Haken umschalten
        function toggleStatus(songId, type) {
            const id = `cell-${songId}-${type}`;
            const cell = document.getElementById(id);
            
            if (cell.innerHTML === "❌") {
                cell.innerHTML = "✅";
                localStorage.setItem(id, "checked");
            } else {
                cell.innerHTML = "❌";
                localStorage.setItem(id, "unchecked");
            }
        }

        // Haken-Zustände laden
        function loadStates() {
            songs.forEach((s) => {
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                const types = ['ablauf', 'sounds', 'drums'];
                
                types.forEach(type => {
                    const id = `cell-${safeTitle}-type`;
                    const storageId = `cell-${safeTitle}-${type}`;
                    const savedState = localStorage.getItem(storageId);
                    const cell = document.getElementById(storageId);
                    
                    if (cell && savedState === "checked") {
                        cell.innerHTML = "✅";
                    }
                });
            });
        }

        // Drag & Drop aktivieren (SortableJS)
        Sortable.create(tbody, {
            handle: '.handle', // Nur am ☰-Symbol greifbar
            animation: 150,    // Schöne, flüssige Animation beim Verschieben
            ghostClass: 'sortable-ghost',
            onEnd: function () {
                updateNumbersAndSaveOrder(); // Nach dem Drop: Nummern neu berechnen & Reihenfolge speichern
            }
        });

        // Initiales Laden der Tabelle
        renderTable();
    </script>
</body>
</html>
