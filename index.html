<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fërkel Sharky - Setlist</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --neon-pink: #ff71ce; 
            --neon-blue: #01cdfe;
            --dark-bg: #0d0c1d; 
            --card-bg: rgba(26, 26, 46, 0.7);
        }
        
        body { 
            background-color: var(--dark-bg); 
            /* Ein feines Retro-Gittermuster im Hintergrund */
            background-image: 
                linear-gradient(rgba(255, 113, 206, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 113, 206, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 15px; 
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* Perfekte Breite für Smartphones und Tablets */
        }

        header { 
            text-align: center; 
            margin-bottom: 10px; 
            margin-top: 10px;
        }

        header img { 
            max-width: 160px; 
            width: 100%;
            height: auto;
        }

        h2 {
            color: var(--neon-pink);
            text-align: center;
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--neon-pink);
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* Liste und die einzelnen Song-Kacheln */
        #setlist-container {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .song-card {
            background: var(--card-bg);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 10px rgba(1, 205, 254, 0.2);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        .song-main {
            display: flex;
            align-items: center;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Grip-Symbol zum Verschieben */
        .handle {
            cursor: grab;
            color: #666;
            font-size: 1.4em;
            margin-right: 12px;
            user-select: none;
        }
        .handle:active { cursor: grabbing; }

        .song-title {
            font-size: 1em;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 10px;
        }

        /* Container für die drei Status-Buttons rechts */
        .status-group {
            display: flex;
            gap: 12px;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45px;
        }

        .status-label {
            font-size: 0.6em;
            color: #aaa;
            text-transform: uppercase;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* Der eigentliche interaktive Button (Haken/Kreuz) */
        .status-btn {
            font-size: 1.3em;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s ease;
        }
        .status-btn:active { transform: scale(0.85); }

        /* Highlight für das Element, das gerade bewegt wird */
        .sortable-ghost {
            opacity: 0.3;
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="Fërkel Sharky Logo">
        </header>
        
        <h2>Fërkel Sharky Setlist</h2>

        <ul id="setlist-container">
            </ul>
    </div>

    <script>
        // Deine vordefinierten Songs
        const defaultSongs = [
            {titel: "Take On Me"}, {titel: "Billie Jean"},
            {titel: "Girls Just Want To Have Fun"}, {titel: "Tainted Love"},
            {titel: "Sweet Dreams (Are Made of This)"}, {titel: "Blue Monday"},
            {titel: "Purple Rain"}, {titel: "Don't You (Forget About Me)"},
            {titel: "Time After Time"}, {titel: "Every Breath You Take"}
        ];

        const container = document.getElementById('setlist-container');

        // Reihenfolge aus dem Speicher laden oder Standard nutzen
        let savedOrder = localStorage.getItem('fs-song-order');
        let songs = savedOrder ? JSON.parse(savedOrder) : defaultSongs;

        // Oberfläche aufbauen
        function renderList() {
            container.innerHTML = "";
            songs.forEach((s, i) => {
                // Erzeugt eine sichere ID aus dem Songnamen für die Speicherstände
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                
                container.innerHTML += `
                    <li class="song-card" data-title="${s.titel}">
                        <div class="song-main">
                            <span class="handle">☰</span>
                            <span class="song-title">${s.titel}</span>
                        </div>
                        <div class="status-group">
                            <div class="status-item">
                                <span id="btn-${safeTitle}-ablauf" class="status-btn" onclick="toggleStatus('${safeTitle}', 'ablauf')">❌</span>
                                <span class="status-label">Ablauf</span>
                            </div>
                            <div class="status-item">
                                <span id="btn-${safeTitle}-sounds" class="status-btn" onclick="toggleStatus('${safeTitle}', 'sounds')">❌</span>
                                <span class="status-label">Sounds</span>
                            </div>
                            <div class="status-item">
                                <span id="btn-${safeTitle}-drums" class="status-btn" onclick="toggleStatus('${safeTitle}', 'drums')">Drums</span>
                            </div>
                        </div>
                    </li>
                `;
            });
            loadStates();
        }

        // Speichert die neue Reihenfolge nach dem Verschieben
        function saveNewOrder() {
            const cards = container.querySelectorAll('.song-card');
            const newOrder = [];
            cards.forEach(card => {
                newOrder.push({ titel: card.getAttribute('data-title') });
            });
            songs = newOrder;
            localStorage.setItem('fs-song-order', JSON.stringify(songs));
        }

        // Schaltet zwischen X und Haken um
        function toggleStatus(songId, type) {
            const id = `btn-${songId}-${type}`;
            const btn = document.getElementById(id);
            
            if (btn.innerHTML === "❌") {
                btn.innerHTML = "✅";
                localStorage.setItem(id, "checked");
            } else {
                btn.innerHTML = "❌";
                localStorage.setItem(id, "unchecked");
            }
        }

        // Lädt den Haken-Status für alle Elemente aus dem Speicher
        function loadStates() {
            songs.forEach((s) => {
                const safeTitle = btoa(unescape(encodeURIComponent(s.titel))).replace(/=/g, "");
                const types = ['ablauf', 'sounds', 'drums'];
                
                types.forEach(type => {
                    const id = `btn-${safeTitle}-${type}`;
                    const savedState = localStorage.getItem(id);
                    const btn = document.getElementById(id);
                    
                    if (btn && savedState === "checked") {
                        btn.innerHTML = "✅";
                    }
                });
            });
        }

        // SortableJS für die Liste aktivieren (wichtig für Touchgeräte)
        Sortable.create(container, {
            handle: '.handle',
            animation: 200,
            ghostClass: 'sortable-ghost',
            onEnd: function () {
                saveNewOrder();
            }
        });

        // App starten
        renderList();
    </script>
</body>
</html>
